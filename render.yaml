services:
  - type: web
    name: campus-portal
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile=false
      pnpm --filter @workspace/campus-portal run build
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: STATIC_DIR
        value: artifacts/campus-portal/dist
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
