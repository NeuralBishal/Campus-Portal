kind = "web"
previewPath = "/"
title = "Campus Portal"
version = "1.0.0"
id = "artifacts/campus-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20687

[services.development]
run = "pnpm --filter @workspace/campus-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-portal", "run", "build" ]
publicDir = "artifacts/campus-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20687"
BASE_PATH = "/"
